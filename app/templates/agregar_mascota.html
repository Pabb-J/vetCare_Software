{% extends 'base.html' %}
{% block content %}

<div class="container">
    <h2>Agregar Mascota</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
            <label>Especie</label>
            <input type="text" name="especie" required>
        </div>
        <div class="form-group">
            <label>Edad</label>
            <input type="number" name="edad" required>
        </div>
        <button type="submit">Agregar</button>
    </form>
</div>

{% endblock %}
