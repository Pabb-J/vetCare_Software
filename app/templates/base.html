<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f7f7;
            color: #333;
        }

        nav {
            background-color: #5ba4a4;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            font-size: 0.95rem;
        }

        nav a:hover { text-decoration: underline; }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #5ba4a4;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #5ba4a4;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #5ba4a4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        button:hover { background-color: #4a8f8f; }

        .link-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .link-text a {
            color: #5ba4a4;
            text-decoration: none;
            font-weight: 600;
        }

        .flash-messages {
            margin-bottom: 1rem;
        }

        .flash {
            background-color: #fdecea;
            color: #c0392b;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .flash.success {
            background-color: #eafaf1;
            color: #1e8449;
        }
    </style>
</head>
<body>

<nav>
    <span class="logo">🐾 VetCare</span>
    <div>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('auth.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('auth.logout') }}">Cerrar sesión</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
            <a href="{{ url_for('auth.registro') }}">Registrarse</a>
        {% endif %}
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
