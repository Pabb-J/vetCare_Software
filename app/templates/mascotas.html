{% extends 'base.html' %}
{% block content %}

<div class="container">
    <h2>Mis Mascotas</h2>
    <a href="{{ url_for('mascota.agregar_mascota') }}">Agregar Mascota</a>
    <ul>
        {% for mascota in mascotas %}
            <li>{{ mascota.nombre }} - {{ mascota.especie }} - {{ mascota.edad }} años</li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
