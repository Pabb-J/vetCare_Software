{% extends 'base.html' %}
{% block content %}

<div class="container">
    <h2>Crear cuenta</h2>

    <div class="flash-messages">
        {% for msg in get_flashed_messages() %}
            <div class="flash">{{ msg }}</div>
        {% endfor %}
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" placeholder="Ej: María" required>
        </div>

        <div class="form-group">
            <label>Apellido</label>
            <input type="text" name="apellido" placeholder="Ej: García" required>
        </div>

        <div class="form-group">
            <label>DNI</label>
            <input type="text" name="dni" placeholder="Ej: 12345678" required>
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="Ej: 1123456789" required>
        </div>

        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="correo" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
            <label>Tipo de usuario</label>
            <select name="rol">
                <option value="dueno">Dueño de mascota</option>
                <option value="veterinario">Veterinario</option>
                <option value="admin">Administrador</option>
            </select>
        </div>

        <button type="submit">Registrarse</button>
    </form>

    <div class="link-text">
        ¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}">Iniciá sesión</a>
    </div>
</div>

{% endblock %}
