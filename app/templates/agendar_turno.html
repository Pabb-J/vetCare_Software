<!DOCTYPE html>
<html>
<head>
    <title>Agendar Turno</title>
</head>
<body>
    <h1>Agendar Turno</h1>
    <form method="POST">
        <label>Fecha:</label>
        <input type="date" name="fecha" required><br>

        <label>Hora:</label>
        <input type="time" name="hora" required><br>

        <label>Veterinario ID:</label>
        <input type="number" name="veterinario_id" required><br>

        <label>Mascota ID:</label>
        <input type="number" name="mascota_id" required><br>

        <button type="submit">Agendar</button>
    </form>
</body>
</html>
